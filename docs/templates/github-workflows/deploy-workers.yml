name: Deploy Cloudflare Workers (LLM Proxy)

on:
  push:
    branches: [main]
    paths:
      - "server/workers/**"
      - ".github/workflows/deploy-workers.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check for Cloudflare token
        id: check
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "::warning::CF_API_TOKEN not set — skipping deploy. Add it in repo Settings → Secrets and rerun."
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.check.outputs.has_token == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.check.outputs.has_token == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/workers/package-lock.json

      - name: Install
        if: steps.check.outputs.has_token == 'true'
        working-directory: server/workers
        run: npm ci

      - name: Deploy
        if: steps.check.outputs.has_token == 'true'
        working-directory: server/workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Health check
        if: steps.check.outputs.has_token == 'true' && success()
        run: |
          echo "Wait 5s for cold start then health check..."
          sleep 5
          if [ -n "${{ vars.WORKER_HEALTH_URL }}" ]; then
            curl -fsS "${{ vars.WORKER_HEALTH_URL }}/health" || echo "::warning::Health check failed (worker may need warm-up)"
          fi
