name = "sulsul-llm-proxy"
main = "src/index.ts"
compatibility_date = "2026-05-01"

# ─── KV Namespaces ───
# Create with:  npx wrangler kv:namespace create CACHE
#               npx wrangler kv:namespace create RATE
# Then paste the IDs below.
[[kv_namespaces]]
binding = "CACHE"
id = "505189cce5284a26aed8f368427ab6da"

[[kv_namespaces]]
binding = "RATE"
id = "2bed1ddb301747c6b5d1a80202785e68"

# ─── Secrets (set via `npx wrangler secret put NAME`) ───
# - ANTHROPIC_API_KEY
# - GEMINI_API_KEY

[observability]
enabled = true

# ─── Optional: custom domain ───
# [[routes]]
# pattern = "llm.example.com/*"
# zone_name = "example.com"
